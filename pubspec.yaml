name: smart_data_organizer
description: AI-powered Excel-like Data Cleaner for Android
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # File handling
  file_picker: 6.1.1
  path_provider: ^2.1.2
  path: ^1.9.0

  # Excel / CSV parsing
  excel: ^4.0.2
  csv: ^6.0.0

  # Grid / Spreadsheet editor
  pluto_grid: 8.0.0

  # State management
  provider: ^6.1.2

  # HTTP / OpenAI
  http: ^1.2.1

  # Local storage
  shared_preferences: ^2.2.3

  # Export
  pdf: ^3.10.8
  printing: ^5.12.0
  share_plus: ^9.0.0

  # UI / Animations
  flutter_spinkit: 5.1.0
  google_fonts: ^6.2.1
  fluttertoast: ^8.2.5
  animate_do: ^3.3.4
  dotted_border: ^2.1.0

  # Storage permissions
  permission_handler: ^11.3.1

  # Admob
  google_mobile_ads: ^4.0.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
